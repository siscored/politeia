name: CI

# Corre en PRs a main y en push a ramas de trabajo.
# NO despliega nada: solo valida contrato de datos + sintetiza la infra.
on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  validar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolver de familias (smoke test, sin datos ni AWS)
        run: |
          python - <<'PY'
          from core.agrupaciones.familias import familia_de
          casos = {
            "UNION POR LA PATRIA": "peronismo",
            "LA LIBERTAD AVANZA": "lla",
            "JUNTOS POR EL CAMBIO": "jxc",
            "COALICION CIVICA ARI": "cc_ari",
            "AVANZA LIBERTAD": "liberales",
            "PARTIDO JUSTIACIALISTA": "peronismo",   # typo de la fuente
            "BLANCO": "no_partidario",
          }
          malos = {k: (familia_de(k), esp) for k, esp in casos.items() if familia_de(k) != esp}
          assert not malos, f"resolver de familias roto: {malos}"
          print(f"resolver OK · {len(casos)} casos")
          PY

      # El gate pesado (validadores sobre el dataset real de S3) corre en deploy.yml,
      # que tiene credenciales OIDC. Acá solo validamos la lógica sin datos.

      - name: CDK synth (chequeo de infra sin desplegar)
        run: |
          cd infra
          pip install -r requirements.txt
          npx --yes aws-cdk@latest synth --all
