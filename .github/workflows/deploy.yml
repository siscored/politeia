name: Deploy

# Despliega la infra a AWS al mergear a main.
# Autenticacion por OIDC (sin claves guardadas): asume el role
# politeia-github-deploy creado por el stack PoliteiaGithubOidc.
on:
  push:
    branches: [main]

permissions:
  id-token: write   # requerido para pedir el token OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Desplegar infra (CDK)
        run: |
          cd infra
          pip install -r requirements.txt
          npx --yes aws-cdk@latest deploy --all --require-approval never
